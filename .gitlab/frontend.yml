workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'

stages:
  - install
  - quality
  - build

variables:
  FRONTEND_DIR: "frontend"

cache:
  key:
    files:
      - frontend/package-lock.json
  paths:
    - frontend/.npm/

frontend_install_dependencies:
  stage: install
  image: node:22-alpine
  script:
    - cd "$FRONTEND_DIR"
    - npm ci --cache .npm --prefer-offline

frontend_type_check:
  stage: quality
  image: node:22-alpine
  script:
    - cd "$FRONTEND_DIR"
    - npm ci --cache .npm --prefer-offline
    - npm exec vue-tsc -- --noEmit

frontend_test:
  stage: quality
  image: node:22-alpine
  script:
    - cd "$FRONTEND_DIR"
    - npm ci --cache .npm --prefer-offline
    - npm run test:coverage
  artifacts:
    when: always
    paths:
      - frontend/coverage/
    expire_in: 1 week

frontend_build:
  stage: build
  image: node:22-alpine
  script:
    - cd "$FRONTEND_DIR"
    - npm ci --cache .npm --prefer-offline
    - npm run build
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
