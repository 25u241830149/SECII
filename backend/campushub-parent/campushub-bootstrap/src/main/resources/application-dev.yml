spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${CAMPUSHUB_DATASOURCE_URL:jdbc:postgresql://localhost:5432/secii_db}
    username: ${CAMPUSHUB_DATASOURCE_USERNAME:postgres}
    password: ${CAMPUSHUB_DATASOURCE_PASSWORD:postgres}
  data:
    redis:
      host: ${CAMPUSHUB_REDIS_HOST:localhost}
      port: ${CAMPUSHUB_REDIS_PORT:6379}
      database: ${CAMPUSHUB_REDIS_DATABASE:0}
      password: ${CAMPUSHUB_REDIS_PASSWORD:}
      timeout: 3s
  sql:
    init:
      mode: never

campushub:
  cors:
    allowed-origin-patterns:
      - http://localhost:5173
      - http://127.0.0.1:5173
  jwt:
    secret: ${CAMPUSHUB_JWT_SECRET:campushub-dev-secret-please-change-before-production-32-bytes}
  redisson:
    address: ${CAMPUSHUB_REDISSON_ADDRESS:redis://localhost:6379}
    password: ${CAMPUSHUB_REDIS_PASSWORD:}
    database: ${CAMPUSHUB_REDIS_DATABASE:0}

logging:
  level:
    com.campushub: DEBUG
    org.springframework.security: INFO
    org.mybatis: INFO
