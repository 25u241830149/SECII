name: SECII CI Pipeline # 流水线的名字

# 触发条件：当任何分支有代码推送 (Push) 或发起合并请求 (PR) 时，都会启动检查
on:
  push:
  pull_request:

# 具体要执行的工作 (Jobs)
jobs:

  # 1. 前端质量检查任务
  frontend-check:
    name: 前端编译与风格检查
    runs-on: ubuntu-latest # 在一台全新的 Ubuntu 临时服务器上运行
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v3

      - name: 安装 Node.js (模拟你们的前端环境)
        uses: actions/setup-node@v3
        with:
          node-version: '18' # Vue 通常使用 Node 16/18+

      - name: 执行前端检查 (编译检查 + 风格检查)
        run: |
          echo "因为当前 frontend 还没放入真正的 Vue 代码，这里先用 echo 占位"
          echo "等后续有了 package.json，请取消下面代码的注释并删除此处 echo"
          
          # cd frontend
          # npm install      # 安装依赖
          # npm run lint     # 【代码风格检查】(检查拼写、规范)
          # npm run build    # 【代码编译检查】(尝试打包，看有没有语法错误)

  # 2. 后端质量检查任务
  backend-check:
    name: 后端编译与风格检查
    runs-on: ubuntu-latest # 同样在临时服务器上运行
    steps:
      - name: 拉取最新代码
        uses: actions/checkout@v3

      - name: 安装 Java 17 (模拟你们的 SpringBoot 环境)
        uses: actions/setup-java@v3
        with:
          java-version: '17' # 你们要求 JDK 17
          distribution: 'temurin'

      - name: 执行后端检查 (编译检查 + 风格检查)
        run: |
          echo "因为当前 backend 还没放入真正的 SpringBoot 代码，这里先用 echo 占位"
          echo "等后续有了 pom.xml，请取消下面代码的注释并删除此处 echo"
          
          # cd backend
          # mvn clean compile   # 【代码编译检查】(确保 Java 代码没有语法错误能编译)
          # mvn checkstyle:check # 【代码风格检查】(需要配合 Checkstyle 插件检查 Java 代码规范)
