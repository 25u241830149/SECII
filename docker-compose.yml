name: campushub-secii

services:
  postgres:
    image: postgis/postgis:16-3.5
    container_name: campushub-secii-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: secii_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      TZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - campushub_secii_postgres_data:/var/lib/postgresql/data
      - ./backend/campushub-parent/campushub-bootstrap/src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d secii_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: campushub-secii-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - campushub_secii_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  campushub_secii_postgres_data:
  campushub_secii_redis_data:
